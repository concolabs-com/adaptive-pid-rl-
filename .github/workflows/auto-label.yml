name: Auto Label PR

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Apply label from PR title type prefix
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const typeMap = {
              feat:     'feature',
              fix:      'bug',
              docs:     'documentation',
              refactor: 'refactor',
              test:     'test',
              chore:    'chore',
              ci:       'ci',
              perf:     'feature',
              security: 'security',
              revert:   'chore',
            };

            const match = title.match(/^(\w+)[\(!\:]/);
            if (!match) return;

            const label = typeMap[match[1]];
            if (!label) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [label],
            });
